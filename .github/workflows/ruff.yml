name: Ruff Check

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check Ruff formatting
        uses: astral-sh/ruff-action@v4.1.0
        with:
          version: "latest"
          args: "format --check --diff"
          src: "."

      - name: Check Ruff lint
        uses: astral-sh/ruff-action@v4.1.0
        with:
          version: "latest"
          args: "check"
          src: "."
